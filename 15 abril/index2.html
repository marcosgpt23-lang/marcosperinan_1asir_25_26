<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        // visualizar números del 1 en adelante hasta que el número introducido sea superior a 100 y múltiplo de 7, si es verdadero, visualiza cuantos números se han mostrado
        function visualizarNumeros(){
            let i = 1
            let sw = 0
            let contador = 0
            while (sw == 0){
                if (i > 100 && i%7 == 0){
                    sw = 1
                }
                document.write(i + " ")
                i++, contador++
            }
        }

        function main(){
            visualizarNumeros()
        }

        main()
    </script>
</head>

</html>
