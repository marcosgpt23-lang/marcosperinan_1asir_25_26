<!DOCTYPE html>

<html>

<head>

  <title>Ejemplo de JavaScript</title>

  <meta charset="UTF-8">
</head>

<body>
    <h3 id="resultado"></h3>
    <form name="form1" action="#">
            <input type="number" name="numero1" id="numero1">
            <input type="number" name="numero2" id="numero2">
            <input type="button" value="Enviar" onclick="Proceso()">
    </form>
 

<script>
    /*17.-) (repaso) Dados dos valores numéricos, obtener la suma de los valores pares incluidos entre ellos */
   
   


    function Proceso (){
        
       var numero1=parseInt(document.getElementById("numero1").value);
        var numero2=parseInt(document.getElementById("numero2").value);
        var suma=0;
        var i=numero1+1;
        while (i < numero2){
            if (i % 2 == 0){
                suma += i;
            }
            i +=1;
        }
        Visualizar (suma);
     
    }


   function Visualizar (dato){
    
     document.getElementById("resultado").innerHTML=dato;
  
}
   

</script>




</body>

</html>
