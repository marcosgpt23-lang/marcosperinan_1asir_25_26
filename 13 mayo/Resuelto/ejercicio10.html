<!DOCTYPE html>

  <title>Ejemplo de JavaScript</title>

  <meta charset="UTF-8">

<body>
 

<script>
    /*10-) Se declara un array1 con los valores numéricos y el tamaño que quiera. Se declara un array2 con valores numéricos pero con el mismo tamaño que el anterior. 
    Se pide
a) Cuantos valores están repetidos en ambos arrays o listas en el mismo orden. b) Guardar los valores anteriores en un array2. Visualizar el array2.
array1 = (3, 6, 7, 8, 9, 33) 
array2 = (3, 4, 7, 3, 9, 33)
Respuesta: 4 valores, es decir los valores 3, 7, 9 y 33. */
   var lista1 = [3, 6, 7, 8, 9, 33];
   var lista2 = [3, 4, 7, 3, 9, 33];
   
   

    // -------- FUNCIONES -------------
    function Proceso (vector1, vector2){
       var lista_resul=[];
        var conta=0;

        for (i=0 ; i <vector1.length; i++){
            if (vector1[i] == vector2[i]){
                lista_resul[conta] = vector1[i];
                conta++;
            }
            
        }
        document.write("Están repetidos: "+conta+" valores");
        return lista_resul;
    }

    function Visualizar (lista){
        document.write("<br>"+'valores que se repiten en ambos listas en el mismo orden <br>');
       for (i=0 ; i <lista.length; i++){
        document.write(lista[i]+" ");
       }
        
        
        
    }

    // --------- PROGRAMA PRINCIPAL -----------------
    var lista_repetidos = Proceso (lista1, lista2);

    Visualizar (lista_repetidos);
    
     

</script>




</body>

</html>
