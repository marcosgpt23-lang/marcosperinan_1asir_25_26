<!DOCTYPE html>
<html lang="es">
<script>
    let tab1 = [2, 44, 5, 6, 7, 8, 9]
    let tab2 = []

    function invertir(array1, array2) {
        for (let i = array1.length - 1; i >= 0; i--){
            array2.push(array1[i])
        }
        document.write(array2)
    }

    invertir(tab1, tab2)
</script>
</html>
