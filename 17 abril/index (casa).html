<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        // Declarar dos array con valores numéricos, visualizar si o no los 2 array son exactamente iguales usando switch

        let tab_1 = [1, 2, 3, 4, 5]
        let tab_2 = [1, 2, 3, 4, 5]

        function compararArrays(array1, array2){ // Devolverá false si son distintos y true si son iguales
            let sw = 0
            let i = 0
            let iguales = false
            while (sw == 0){
                if (array1.length != array2.length){
                    iguales = false
                    sw = 1
                } else if (array1[i] != array2[i]) {
                    iguales = false
                    sw = 1
                }
                if (i >= array1.length) {
                    iguales = true
                    sw = 1
                }
                i++
            }
            return iguales
        }

        function main(){
            document.write(tab_1, "<br>", tab_2, "<br>")
            if (compararArrays(tab_1, tab_2) == true){
                document.write("Los arrays son iguales")
            } else {
                document.write("Los arrays no son iguales")
            }
        }

        main()
    </script>
</head>

</body>
</html>
