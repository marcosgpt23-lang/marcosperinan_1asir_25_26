<script>
/*
9.-) Declarar un vector de 12 valores numéricos. A continuación, declarar un valor numérico y visualizar si se encuentra en el vector o no. En caso afirmativo, decir en qué posición (1ª, 2ª,3ª, etc) se encuentra.
*/

  var tab=[10,20,30,40,50,60,80, 90,100,110, 120, 130], numero=60;

  resul = Proceso (tab, numero);
 
  Visualizar (resul);
   
  
  // ---------------- FUNCIONES --------------------

function Proceso (tab, numero){
    var  i, pos="no";
    for (i=0; i < tab.length; i++){
       if (numero == tab[i]){
          pos = i; 
       }
    }
    return pos+1;
}

function Visualizar (resul){
   if (resul == "no"){
       alert ("el valor no se encuentra en el array");
   } else {
      alert ("SI se encuentra,  en la posicion "+resul+'ª');
   }
    
}

  
</script>

</body>
</html>
