<script>
/*
3.-) Dado un array1 con 7 valores numéricos, pasar a otro array2 aquellos valores superiores a la media. Visualizar el array2.


*/

  var tab1=[1,2,3,4,5,6,7], resul_media;

  resul_media = Media (tab1);
 
 tab2 = Proceso (tab1, resul_media);
 
 Visualizar (tab2);
   
  
  // ---------------- FUNCIONES --------------------
  function Media (tab1){
      var suma=0, media;
      for (i=0; i < 7; i++){
          suma = suma + tab1[i];
      }
      media = suma / 7;
      return media;
  }
  
  function Proceso (tab1, resul_media) {
      var i, tab2=[],conta=0;
      for (i=0; i < 7; i++){
          if (tab1[i] > resul_media){
              tab2[conta] = tab1[i];
              conta++;
          }
      }
      return tab2;
  }
 function Visualizar  (tab2) {
      var i;
      for (i=0; i < tab2.length; i++){
          alert (tab2[i]);
          
      }
      
  }

  
</script>

</body>
</html>
