<script>
/*
5.-) Dado un array con 7 elementos, visualizar si o no están todos ordenados ascendentemente.  


*/

  var tab=[10,20,30,40,50,60,80, 90], resul;

  resul= Proceso (tab)
 
 Visualizar (resul);
   
  
  // ---------------- FUNCIONES --------------------

function Proceso (tab){
    var  sw="si";
    for (i=1; i < tab.length; i++){
        if (tab[i] <  tab[i-1]){
           sw="no";
        }
    }
    return sw;
}
function Visualizar (resul){
    if (resul == "si"){
        alert ("Estan todos ordenados");
    }else{
         alert ("NO estan todos ordenados");
    }
}

  
</script>
