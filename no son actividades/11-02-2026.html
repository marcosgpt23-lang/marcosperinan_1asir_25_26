    <script>
        /*Declarar un array con el nombre de un alumno y sus 3 notas. Visualiza el nombre y la media del alumno*/
        let matNotas = [
            ["Marcos", 6, 0, 7],
            ["Ana", 8, 7, 9],
            ["Luis", 5, 6, 2]
        ];

        function calcularMedia(arrayNotas) {
            let suma = 0;
            for (let i = 1; i < arrayNotas.length; i++) {
                suma += arrayNotas[i];
            }
            return suma / (arrayNotas.length - 1);
        }

        function verTodasLasNotas(arrayAlumnos){
            for (let i = 0; i < arrayAlumnos.length; i++) {
                document.write("El alumno " + arrayAlumnos[i][0] + " tiene una media de " + calcularMedia(arrayAlumnos[i]).toFixed(2) + ". ");
                if (calcularMedia(arrayAlumnos[i]) >= 5){
                    document.write("Está aprobado.<br>");
                }else{
                    document.write("Está suspenso.<br>");
                }
            }
        }

        function main() {
            verTodasLasNotas(matNotas);
        }

        main();
    </script>

</body>
