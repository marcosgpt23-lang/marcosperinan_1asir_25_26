<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <style>
            
            table *{
                border: 1px solid black;
            }
            table{
                border-collapse: collapse;
            }
        </style>
    </head>
    <body>
        <a href="https://www.google.com">Google</a>
        <br>
        <img src="imagen.png" alt="Imagen de prueba">

        <div id="listas">
            <ol>
                <li>Lista</li>
                <li>Ordenada</li>
            </ol>
            <ul>
                <li>Lista</li>
                <li>Desordenada</li>
            </ul>
        </div>

        <div id="tablas">
            <table>
                <th>Encabezado</th>
                <tr>
                    <td>Celda 1</td>
                    <td>Celda 2</td>
                </tr>
                <tr>
                    <td>Celda 3</td>
                    <td>Celda 4</td>
                </tr>
            </table>
        </div>

        <div id="formulario">
            <form method="post">
                <label for="nombre">Nombre</label>
                <input type="text" name="nombre"><br>
                <input type="checkbox" name="genero" value="Python">Python
                <input type="checkbox" name="genero" value="Java">Java
                <br>
                Sexo
                <select name="genero">
                    <option value="Hombre">Hombre</option>
                    <option value="Mujer">Mujer</option>
                </select>
                <br>
                <input type="submit" value="Enviar">
                <input type="reset" value="Borrar">
            </form>
        </div>
    </body>
</html>
